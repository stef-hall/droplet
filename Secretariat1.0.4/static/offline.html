<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretariat Offline</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }
    main {
      width: min(560px, 100%);
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 1.2rem; }
    p { margin: 0; line-height: 1.5; color: #333; }
  </style>
</head>
<body>
  <main>
    <h1>You are offline</h1>
    <p>Secretariat is unavailable without internet right now. Reconnect and refresh to continue.</p>
  </main>
</body>
</html>
