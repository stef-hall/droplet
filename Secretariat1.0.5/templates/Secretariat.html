<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Secretariat</title>
  <meta name="theme-color" content="#f4f4f4" id="theme-color-meta">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Secretariat">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="icon" href="/static/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
  <link rel="stylesheet" href="/templates/styles.css">
</head>
<body>
  <section id="auth-overlay" class="auth-overlay hidden" aria-live="polite">
    <div class="auth-card">
      <h1>Welcome to Secretariat</h1>
      <p id="auth-subtitle">Sign in to continue.</p>
      <form id="auth-form" class="auth-form">
        <input id="auth-email" type="text" placeholder="Username" autocomplete="username" required>
        <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password" required>
        <label id="auth-trust-wrap" class="auth-trust-wrap">
          <input id="auth-trust-device" type="checkbox" checked>
          <span>Trust this device for 60 days</span>
        </label>
        <button id="auth-submit" type="submit">Sign In</button>
      </form>
      <button id="auth-toggle" type="button" class="auth-toggle">Need an account? Sign up</button>
      <button id="auth-signout" type="button" class="auth-signout hidden">Sign out</button>
      <div id="auth-status" class="auth-status"></div>
    </div>
  </section>

  <main class="app-shell">
    <div class="pwa-header-spacer" aria-hidden="true"></div>
    <header class="chat-header">
      <div class="chat-header-left">
        <button id="nav-drawer-trigger" type="button" class="nav-drawer-trigger" aria-label="Open navigation menu" aria-controls="nav-drawer" aria-expanded="false">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </button>
      </div>
      <div class="chat-header-right">
        <div class="chat-menu-wrap">
          <button id="chat-menu-trigger" type="button" class="chat-menu-trigger" aria-label="Open menu" aria-haspopup="true" aria-expanded="false">
            <img src="/static/icons/user.png" alt="" class="chat-menu-trigger-icon" aria-hidden="true">
          </button>
          <div id="chat-menu" class="chat-menu hidden" role="menu" aria-label="Account menu">
            <button id="chat-settings" type="button" class="chat-menu-item" role="menuitem">Settings</button>
            <button id="chat-signout" type="button" class="chat-menu-item" role="menuitem">Sign out</button>
          </div>
        </div>
      </div>
    </header>
    <div id="nav-drawer-overlay" class="nav-drawer-overlay hidden" aria-hidden="true"></div>
    <aside id="nav-drawer" class="nav-drawer" aria-hidden="true">
      <div class="nav-drawer-header">
      </div>
      <div class="nav-drawer-body">
        <div class="nav-drawer-main">
          <div class="toggle-box">
            <label class="theme-toggle" for="sticky-notes-toggle">
              <span>Sticky Notes</span>
              <input id="sticky-notes-toggle" type="checkbox" role="switch" aria-label="Toggle sticky notes">
            </label>
          </div>
        </div>
        <div class="nav-drawer-bottom">
          <div class="toggle-box">
          <label class="theme-toggle" for="dark-mode-toggle">
            <img id="theme-toggle-icon-left" src="/static/icons/lm_on.png" alt="Theme icon left" class="theme-toggle-icon">
            <input id="dark-mode-toggle" type="checkbox" role="switch" aria-label="Toggle dark mode">
            <img id="theme-toggle-icon-right" src="/static/icons/lm_moon.png" alt="Theme icon right" class="theme-toggle-icon">
          </label>
          </div>
        </div>
      </div>
    </aside>

    <section id="chat-feed" class="chat-feed" aria-live="polite">
      <article id="initial-assistant-message" class="msg assistant initial-assistant-message hero">
        <div class="bubble">What do you need help scheduling today?</div>
      </article>
    </section>

    <div class="attachment-row">
      <div id="attachment-pill" class="attachment-pill hidden">
        <span>+1 attachment</span>
        <button type="button" id="clear-attachment" class="pill-clear" aria-label="Remove attachment">×</button>
      </div>
    </div>

    <form id="secretariat-form" class="composer">
      <button type="button" id="add-attachment" class="icon-btn" aria-label="Add">+</button>
      <input id="image-upload" type="file" accept="image/*" class="hidden-file-input">
      <textarea id="prompt" placeholder="Ask anything..." rows="1" required spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>
      <button type="submit" class="send-btn" aria-label="Send">&#x21AA;&#xFE0E;</button>
    </form>

    <div id="meta" class="meta"></div>
  </main>

  <div id="sticky-note-effects-layer" class="sticky-note-effects-layer" aria-hidden="true">
    <div id="sticky-note-dock-hint" class="sticky-note-dock-hint">
      <span class="sticky-note-dock-hint-label">Drop here to stow</span>
    </div>
    <div id="sticky-note-dock-slot" class="sticky-note-dock-slot" aria-hidden="true"></div>
  </div>

  <div id="sticky-note-layer" class="sticky-note-layer" aria-hidden="true">
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  
</body>
</html>
