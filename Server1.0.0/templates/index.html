<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretariat 3.0 UI</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --error: #ef4444;
      --ok: #86efac;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: radial-gradient(circle at 20% 20%, #1e293b, var(--bg));
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      width: min(780px, 100%);
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 24px;
    }

    h1 { margin: 0 0 8px; }
    p { margin: 0 0 16px; color: var(--muted); }

    form { display: grid; gap: 12px; }

    textarea {
      width: 100%;
      min-height: 140px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0b1220;
      color: var(--text);
      padding: 12px;
      font-size: 1rem;
      resize: vertical;
    }

    button {
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #082f49;
      font-weight: 700;
      cursor: pointer;
    }

    .output {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0b1220;
      white-space: pre-wrap;
      min-height: 56px;
    }

    .meta { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }
    .error { color: var(--error); }
    .ok { color: var(--ok); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Secretariat 3.0 Web UI</h1>
    <p>Send a request to your Python API and view the assistant response.</p>

    <form id="secretariat-form">
      <textarea id="prompt" placeholder="Example: Add a run tomorrow at 6pm" required></textarea>
      <button type="submit">Send</button>
    </form>

    <div id="output" class="output">Awaiting input...</div>
    <div id="meta" class="meta"></div>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
