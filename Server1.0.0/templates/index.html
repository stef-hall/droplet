<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretariat 3.0 UI</title>
  <link rel="stylesheet" href="/templates/styles.css">
</head>
<body>
  <main class="card">
    <h1>Secretariat 3.0 Web UI</h1>
    <p>Send a request to your Python API and view the assistant response.</p>

    <form id="secretariat-form">
      <textarea id="prompt" placeholder="Example: Add a run tomorrow at 6pm" required></textarea>
      <button type="submit">Send</button>
    </form>

    <div id="output" class="output">Awaiting input...</div>
    <div id="meta" class="meta"></div>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
