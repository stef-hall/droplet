<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretariat</title>
  <link rel="stylesheet" href="/templates/styles.css">
</head>
<body>
  <main class="app-shell">
    <section id="chat-feed" class="chat-feed" aria-live="polite">
      <article class="msg assistant">
        <div class="bubble">What do you need help scheduling today?</div>
      </article>
    </section>

    <form id="secretariat-form" class="composer">
      <button type="button" class="icon-btn" aria-label="Add">+</button>
      <input id="prompt" type="text" placeholder="Ask anything" autocomplete="off" required>
      <button type="submit" class="send-btn" aria-label="Send">→</button>
    </form>

    <div id="meta" class="meta"></div>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
