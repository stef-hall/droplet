<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretariat</title>
  <meta name="theme-color" content="#f4f4f4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Secretariat">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="icon" href="/static/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
  <link rel="stylesheet" href="/templates/styles.css">
</head>
<body>
  <main class="app-shell">
    <section id="chat-feed" class="chat-feed" aria-live="polite">
      <article class="msg assistant">
        <div class="bubble">What do you need help scheduling today?</div>
      </article>
    </section>

    <div id="attachment-pill" class="attachment-pill hidden">
      <span>+1 attachment</span>
      <button type="button" id="clear-attachment" class="pill-clear" aria-label="Remove attachment">x</button>
    </div>

    <form id="secretariat-form" class="composer">
      <button type="button" id="add-attachment" class="icon-btn" aria-label="Add">+</button>
      <input id="image-upload" type="file" accept="image/*" class="hidden-file-input">
      <input id="prompt" type="text" placeholder="Ask anything" autocomplete="off" required>
      <button type="submit" class="send-btn" aria-label="Send">↪</button>
    </form>

    <div id="meta" class="meta"></div>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
